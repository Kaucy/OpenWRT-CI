name: QCA-IPQ60XX-USB

on:
  # 手动编译或仅生成配置文件
  workflow_dispatch:
    inputs:
      PACKAGE:
        description: '手动调整插件包，多个请用\n符号隔开。'
        required: false
        type: string
      TEST:
        description: '仅输出配置文件，不编译固件。'
        default: 'false'
        required: false
        type: boolean

permissions:
  contents: write

jobs:
  resolve-version:
    name: Resolve latest LibWrt release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{steps.release.outputs.tag}}
      version: ${{steps.release.outputs.version}}
    steps:
      - id: release
        name: Find latest semantic version tag
        shell: bash
        run: |
          set -euo pipefail
          TAG=$(git ls-remote --tags --refs https://github.com/Kaucy/LibWrt.git \
            | awk -F/ '/refs\/tags\/v[0-9]+\.[0-9]+\.[0-9]+$/ { print $3 }' \
            | sort -V \
            | tail -n 1)
          if [ -z "$TAG" ]; then
            echo "ERROR: no vX.Y.Z release tag found in Kaucy/LibWrt"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "Using LibWrt release: $TAG"

  config:
    name: IPQ60XX-WIFI-YES-USB-YES
    needs: resolve-version
    uses: ./.github/workflows/WRT-CORE.yml
    with:
      WRT_CONFIG: IPQ60XX-WIFI-YES-USB-YES
      WRT_THEME: argon
      WRT_NAME: YKWRT
      WRT_SSID: YKWRT
      WRT_WORD: 12345678
      WRT_IP: 192.168.88.1
      WRT_PW: password
      WRT_REPO: https://github.com/Kaucy/LibWrt.git
      WRT_BRANCH: ${{needs.resolve-version.outputs.tag}}
      WRT_VERSION: ${{needs.resolve-version.outputs.version}}
      WRT_SOURCE: Kaucy/LibWrt
      WRT_PACKAGE: ${{inputs.PACKAGE}}
      WRT_TEST: ${{inputs.TEST}}
